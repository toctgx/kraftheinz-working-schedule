<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>KHK Work Status Board</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <style>
      @import url('https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&display=swap');
      * { box-sizing: border-box; }
      body { margin: 0; font-family: 'Cabinet Grotesk', -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(180deg, #eef2f4 0%, #dde5e8 100%); color: #27343c; }
      .app { max-width: 1160px; margin: 0 auto; padding: 20px 16px 44px; }
      .hero { display: flex; justify-content: space-between; align-items: end; gap: 16px; margin-bottom: 18px; }
      .hero h1 { margin: 0; font-size: 38px; letter-spacing: -0.06em; }
      .hero p { margin: 8px 0 0; color: #74838c; font-size: 15px; }
      .today-card { min-width: 200px; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.76); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.7); box-shadow: 0 18px 30px rgba(52,70,79,0.08); }
      .today-card strong { display: block; font-size: 12px; letter-spacing: 0.16em; color: #2cced2; }
      .today-card span { display: block; margin-top: 6px; font-size: 16px; font-weight: 700; }
      .layout { display: grid; grid-template-columns: 340px 1fr 320px; gap: 16px; align-items: start; }
      .glass { background: rgba(255,255,255,0.68); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.76); border-radius: 28px; box-shadow: 0 20px 34px rgba(52,70,79,0.08); }
      .panel { padding: 18px; }
      .panel-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
      .panel-title h2 { margin: 0; font-size: 22px; letter-spacing: -0.05em; }
      .panel-title span { color: #2cced2; font-weight: 800; font-size: 12px; }
      .field { margin-bottom: 12px; }
      .field label { display: block; font-size: 13px; color: #74838c; margin-bottom: 6px; }
      .field input, .field select { width: 100%; min-height: 48px; border: 1px solid #d9e3e7; border-radius: 16px; padding: 0 14px; font: inherit; background: rgba(255,255,255,0.88); color: #27343c; }
      .btn-row { display: flex; gap: 10px; margin-top: 14px; }
      button { border: none; border-radius: 16px; min-height: 48px; padding: 0 16px; font: inherit; font-weight: 800; cursor: pointer; }
      .primary { background: #2cced2; color: white; }
      .secondary { background: #e7f9fa; color: #22aab0; }
      .helper { font-size: 13px; color: #74838c; margin-top: 10px; line-height: 1.45; }
      .team-tabs, .admin-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; }
      .team-tab, .admin-tab { flex: 0 0 auto; min-height: 40px; padding: 0 14px; border-radius: 999px; background: rgba(255,255,255,0.78); color: #5d6b74; border: 1px solid #e2e8ef; }
      .team-tab.active, .admin-tab.active { background: #2cced2; color: white; border-color: transparent; }
      .team-card { padding: 16px; border-radius: 24px; background: rgba(255,255,255,0.76); border: 1px solid rgba(255,255,255,0.76); }
      .team-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
      .team-head h3 { margin: 0; font-size: 20px; letter-spacing: 0.04em; }
      .badge { background: #e7f9fa; color: #1faeb5; border-radius: 999px; padding: 8px 12px; font-size: 12px; font-weight: 800; }
      .member-list { display: grid; gap: 10px; }
      .member { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.92); border: 1px solid #ebf1f4; }
      .member strong { display: block; font-size: 16px; }
      .member span { font-size: 13px; color: #74838c; }
      .status-pill { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 0 14px; border-radius: 999px; font-size: 13px; font-weight: 800; white-space: nowrap; }
      .office { background: #edf7ef; color: #1f7a43; }
      .remote { background: #e8f9fb; color: #12a7b0; }
      .vacation { background: #fff3e2; color: #ba6b00; }
      .half { background: #ffeaf0; color: #cf4376; }
      .timeoff { background: #f0eaff; color: #6d28d9; }
      .alert-box { display:none; margin-bottom: 12px; padding: 14px 16px; border-radius: 18px; background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; font-size: 14px; line-height: 1.5; }
      .alert-box.show { display:block; }
      .admin-summary { display: grid; gap: 12px; }
      .metric { padding: 18px; border-radius: 22px; background: rgba(255,255,255,0.82); border: 1px solid rgba(255,255,255,0.8); }
      .metric small { display: block; color: #74838c; font-size: 12px; letter-spacing: 0.12em; }
      .metric strong { display: block; margin-top: 8px; font-size: 32px; letter-spacing: -0.05em; }
      .metric span { color: #5c6b74; font-size: 14px; }
      .admin-list { margin-top: 10px; display: none; gap: 10px; }
      .admin-list.show { display: grid; }
      .admin-item { padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,0.82); }
      .admin-item strong { display:block; font-size: 15px; margin-bottom: 6px; }
      .admin-item span { color:#74838c; font-size:13px; }
      .admin-count { margin-top: 6px; font-size: 28px; font-weight: 800; letter-spacing: -0.05em; }
      .empty { color: #98a2b3; font-size: 14px; }
      @media (max-width: 1080px) { .layout { grid-template-columns: 1fr; } }
      @media (max-width: 640px) {
        .app { padding: 16px 12px 34px; }
        .hero { display: block; }
        .hero h1 { font-size: 30px; }
        .today-card { margin-top: 14px; min-width: 0; }
        .panel { padding: 16px; }
        .member { grid-template-columns: 1fr; align-items: start; }
        .status-pill { width: fit-content; }
        .btn-row { flex-direction: column; }
        button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="hero">
        <div>
          <h1>KHK Working Board</h1>
          <p>모바일에서 바로 접속해서 오늘 팀별 근무 상태를 확인하는 반응형 웹앱입니다.</p>
        </div>
        <div class="today-card">
          <strong>TODAY</strong>
          <span id="todayLabel"></span>
        </div>
      </section>

      <section class="layout">
        <aside class="glass panel">
          <div class="panel-title"><h2>WORKING SCHEDULE</h2><span>UPDATE</span></div>
          <div class="field"><label for="teamSelect">팀</label><select id="teamSelect"></select></div>
          <div class="field"><label for="nameSelect">이름</label><select id="nameSelect"></select></div>
          <div class="field"><label for="statusSelect">근무 상태</label><select id="statusSelect"><option value="office">출근</option><option value="remote">재택</option><option value="vacation">연차</option><option value="half-am">오전반차</option><option value="half-pm">오후반차</option><option value="timeoff">반반차 (시간 표시)</option></select></div>
          <div class="field" id="timeField" style="display:none;"><label for="timeInput">시간 표시</label><input id="timeInput" placeholder="예: 15:00~17:00" /></div>
          <div class="btn-row"><button class="primary" id="saveBtn">저장</button><button class="secondary" id="resetBtn">초기화</button></div>
          <div class="helper">팀 선택 후 이름 리스트에서 선택하고 상태를 저장하면 바로 반영됩니다.</div>
        </aside>

        <main class="glass panel">
          <div class="team-tabs" id="teamTabs"></div>
          <div id="teamBoard"></div>
        </main>

        <aside class="glass panel">
          <div class="panel-title"><h2>관리자 페이지</h2><span>MONTHLY</span></div>
          <div class="alert-box" id="alertBox"></div>
          <div class="admin-summary">
            <div class="metric"><small>총 등록 인원</small><strong id="memberCount">0</strong><span>전체 팀 기준 등록된 인원 수</span></div>
          </div>
          <div class="admin-tabs" id="adminTabs"></div>
          <div class="admin-list" id="adminList"></div>
        </aside>
      </section>
    </div>

    <script>
      const teams = ['SALES TEAM','MKT TEAM','FINANCE TEAM','S&OP TEAM','LOGISTICS TEAM','HR TEAM','COUNTRY MANAGER'];
      const defaultMembers = {
        'SALES TEAM': ['Alex', 'Austin', 'John', 'Dennis', 'Tom', 'Antonio', 'Thomas', 'Ryan', 'Hugh', 'Luca', 'Adela', 'Dami'],
        'MKT TEAM': ['Jen', 'Jimin', 'Heewon', 'Leo', 'Olivia'],
        'FINANCE TEAM': ['Steve', 'Rachel', 'Joanne', 'Kahn'],
        'S&OP TEAM': ['Grace', 'Sophie', 'Jessica'],
        'LOGISTICS TEAM': ['Edward', 'Amy', 'Jane', 'Nari', 'Ryan'],
        'HR TEAM': ['Claire'],
        'COUNTRY MANAGER': ['YK.Lee']
      };
      const statusMap = {
        office: { label: '출근', className: 'office' },
        remote: { label: '재택', className: 'remote' },
        vacation: { label: '연차', className: 'vacation' },
        'half-am': { label: '오전반차', className: 'half' },
        'half-pm': { label: '오후반차', className: 'half' },
        timeoff: { label: '반반차', className: 'timeoff' }
      };
      const adminViews = [
        { key: 'remote', label: '재택' },
        { key: 'vacation', label: '연차' },
        { key: 'half', label: '반차' },
        { key: 'timeoff', label: '반반차' }
      ];
      const displayTeam = (team) => team
        .replace('SALES TEAM', 'SALES')
        .replace('MKT TEAM', 'MKT')
        .replace('FINANCE TEAM', 'FINANCE')
        .replace('S&OP TEAM', 'S&OP')
        .replace('LOGISTICS TEAM', 'LOGISTICS')
        .replace('HR TEAM', 'HR');
      const storageKey = 'khk-work-status-demo-v3';
      const monthKey = () => {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      };
      const initialState = {
        members: teams.reduce((acc, team) => {
          acc[team] = defaultMembers[team].map(name => ({ name, status: 'office', timeNote: '' }));
          return acc;
        }, {}),
        monthlyCounts: {}
      };
      const saved = localStorage.getItem(storageKey);
      const state = saved ? JSON.parse(saved) : initialState;
      let currentTeam = teams[0];
      let currentAdminTab = null;

      const teamSelect = document.getElementById('teamSelect');
      const nameSelect = document.getElementById('nameSelect');
      const statusSelect = document.getElementById('statusSelect');
      const timeField = document.getElementById('timeField');
      const timeInput = document.getElementById('timeInput');
      const teamTabs = document.getElementById('teamTabs');
      const teamBoard = document.getElementById('teamBoard');
      const adminTabs = document.getElementById('adminTabs');
      const adminList = document.getElementById('adminList');
      const alertBox = document.getElementById('alertBox');

      const persist = () => localStorage.setItem(storageKey, JSON.stringify(state));
      const memberCount = () => teams.reduce((sum, team) => sum + state.members[team].length, 0);
      const getMonthBucket = () => {
        const key = monthKey();
        if (!state.monthlyCounts[key]) state.monthlyCounts[key] = {};
        return state.monthlyCounts[key];
      };
      const incrementMonthly = (name, team, status) => {
        if (status === 'office') return;
        const bucket = getMonthBucket();
        const id = `${team}__${name}`;
        if (!bucket[id]) bucket[id] = { name, team, remote: 0, vacation: 0, half: 0, timeoff: 0 };
        if (status === 'remote') bucket[id].remote += 1;
        else if (status === 'vacation') bucket[id].vacation += 1;
        else if (status === 'half-am' || status === 'half-pm') bucket[id].half += 1;
        else if (status === 'timeoff') bucket[id].timeoff += 1;
      };
      const monthlyList = () => Object.values(getMonthBucket()).sort((a, b) => a.team.localeCompare(b.team) || a.name.localeCompare(b.name));
      const weeklyRemoteLimit = () => {
        const now = new Date();
        const weeks = Math.ceil(new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() / 7);
        return weeks * 2;
      };

      const renderTeamOptions = () => {
        teamSelect.innerHTML = teams.map(team => `<option value="${team}">${displayTeam(team)}</option>`).join('');
      };
      const renderNameOptions = () => {
        const selectedTeam = teamSelect.value;
        nameSelect.innerHTML = state.members[selectedTeam].map(member => `<option value="${member.name}">${member.name}</option>`).join('');
      };
      const renderTeamTabs = () => {
        teamTabs.innerHTML = teams.map(team => `<button class="team-tab ${team === currentTeam ? 'active' : ''}" data-team="${team}">${displayTeam(team)}</button>`).join('');
        teamTabs.querySelectorAll('[data-team]').forEach(btn => btn.addEventListener('click', () => {
          currentTeam = btn.dataset.team;
          renderTeamTabs();
          renderTeamBoard();
        }));
      };
      const renderTeamBoard = () => {
        const members = state.members[currentTeam];
        teamBoard.innerHTML = `
          <section class="team-card">
            <div class="team-head"><h3>${displayTeam(currentTeam)}</h3><div class="badge">${members.length}명</div></div>
            <div class="member-list">
              ${members.map(member => {
                const meta = statusMap[member.status];
                const detail = member.status === 'timeoff' && member.timeNote ? member.timeNote : '오늘 상태 등록';
                return `
                  <div class="member">
                    <div>
                      <strong>${member.name}</strong>
                      <span>${detail}</span>
                    </div>
                    <div class="status-pill ${meta.className}">${meta.label}${member.status === 'timeoff' && member.timeNote ? ` (${member.timeNote})` : ''}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </section>
        `;
      };
      const renderAdminTabs = () => {
        adminTabs.innerHTML = adminViews.map(tab => `<button class="admin-tab ${tab.key === currentAdminTab ? 'active' : ''}" data-admin="${tab.key}">${tab.label}</button>`).join('');
        adminTabs.querySelectorAll('[data-admin]').forEach(btn => btn.addEventListener('click', () => {
          currentAdminTab = currentAdminTab === btn.dataset.admin ? null : btn.dataset.admin;
          renderAdminTabs();
          renderAdmin();
        }));
      };
      const renderAlerts = (list) => {
        const limit = weeklyRemoteLimit();
        const exceeded = list.filter(item => item.remote > limit);
        if (!exceeded.length) {
          alertBox.classList.remove('show');
          alertBox.textContent = '';
          return;
        }
        alertBox.classList.add('show');
        alertBox.textContent = `알람: 월간 재택 허용 기준(${limit}회)를 초과한 인원 - ${exceeded.map(item => `${item.name} ${item.remote}회`).join(', ')}`;
      };
      const renderAdmin = () => {
        const list = monthlyList();
        document.getElementById('memberCount').textContent = memberCount();
        renderAlerts(list);
        if (!currentAdminTab) {
          adminList.classList.remove('show');
          adminList.innerHTML = '';
          return;
        }
        adminList.classList.add('show');
        adminList.innerHTML = list.length ? list.map(item => `
          <div class="admin-item">
            <strong>${item.name} · ${displayTeam(item.team)}</strong>
            <span>${adminViews.find(v => v.key === currentAdminTab).label} 월간 누계</span>
            <div class="admin-count">${item[currentAdminTab]}</div>
          </div>
        `).join('') : '<div class="empty">이번 달 누적된 근무상태 기록이 없습니다.</div>';
      };
      const updateToday = () => {
        const now = new Date();
        document.getElementById('todayLabel').textContent = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      };
      const saveStatus = () => {
        const team = teamSelect.value;
        const name = nameSelect.value;
        const status = statusSelect.value;
        const timeNote = timeInput.value.trim();
        if (!name) return;
        const member = state.members[team].find(item => item.name === name);
        if (!member) return;
        member.status = status;
        member.timeNote = status === 'timeoff' ? timeNote : '';
        incrementMonthly(name, team, status);
        currentTeam = team;
        persist();
        timeInput.value = '';
        renderTeamTabs();
        renderTeamBoard();
        renderAdminTabs();
        renderAdmin();
      };

      statusSelect.addEventListener('change', () => {
        timeField.style.display = statusSelect.value === 'timeoff' ? 'block' : 'none';
      });
      teamSelect.addEventListener('change', renderNameOptions);
      document.getElementById('saveBtn').addEventListener('click', saveStatus);
      document.getElementById('resetBtn').addEventListener('click', () => {
        localStorage.removeItem(storageKey);
        location.reload();
      });

      renderTeamOptions();
      renderNameOptions();
      renderTeamTabs();
      renderTeamBoard();
      renderAdminTabs();
      renderAdmin();
      updateToday();
    </script>
  </body>
</html>
