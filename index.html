<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>KHK Work Status Board</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <style>
      @import url('https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&display=swap');
      * { box-sizing: border-box; }
      body { margin: 0; font-family: 'Cabinet Grotesk', -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(180deg, #fbf0df 0%, #f7dec0 34%, #f1cf9a 100%); color: #2a180f; }
      .app { max-width: 560px; margin: 0 auto; min-height: 100vh; height: 100vh; padding: 10px 10px 94px; display: flex; flex-direction: column; overflow: hidden; }
      .hero { display: grid; grid-template-columns: 1fr; align-items: stretch; gap: 8px; margin-bottom: 8px; flex: 0 0 auto; }
      .hero-title { display: none; }
      .today-card { padding: 12px 12px; min-width: 108px; border-radius: 20px; background: rgba(255,248,242,0.86); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.7); box-shadow: 0 12px 20px rgba(123, 36, 16, 0.08); text-align: right; }
      .today-card strong { display: block; font-size: 10px; letter-spacing: 0.16em; color: #c13725; }
      .today-card span { display: block; margin-top: 4px; font-size: 12px; font-weight: 700; }
      .glass { background: rgba(255,248,242,0.84); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.72); border-radius: 24px; box-shadow: 0 16px 24px rgba(123, 36, 16, 0.08); }
      .screen { display: none; }
      .screen.active { display: block; flex: 1 1 auto; min-height: 0; overflow: hidden; }
      .panel { padding: 14px; }
      .hero-metrics { display:none; }
      .panel-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
      .panel-title h2 { margin: 0; font-size: 17px; letter-spacing: -0.05em; }
      .panel-title span { color: #c13725; font-weight: 800; font-size: 11px; }
      .field-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .status-highlight { margin-bottom: 8px; padding: 10px 12px; border-radius: 18px; background: linear-gradient(135deg, #fff5eb 0%, #ffe1c2 100%); color: #7c2d12; display:flex; justify-content:space-between; align-items:center; gap:10px; }
      .status-highlight strong { font-size: 13px; letter-spacing: -0.04em; }
      .status-highlight span { font-size: 12px; font-weight: 700; color: #a14120; }
      .field { margin-bottom: 8px; }
      .field label { display: block; font-size: 12px; color: #7f5c4c; margin-bottom: 5px; }
      .field input, .field select { width: 100%; min-height: 42px; border: 1px solid #edd6c3; border-radius: 14px; padding: 0 12px; font: inherit; background: rgba(255,255,255,0.94); color: #2a180f; font-weight: 600; }
      .btn-row { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 8px; margin-top: 8px; }
      button { border: none; border-radius: 14px; min-height: 40px; padding: 0 12px; font: inherit; font-weight: 800; cursor: pointer; }
      .primary { background: linear-gradient(135deg, #be2b1f 0%, #e04829 100%); color: white; }
      .secondary { background: #fff0e5; color: #b63a24; }
      .helper { font-size: 11px; color: #7f5c4c; margin-top: 6px; line-height: 1.35; }
      .team-tabs, .admin-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 8px; }
      .team-tab, .admin-tab { flex: 0 0 auto; min-height: 36px; padding: 0 14px; border-radius: 999px; background: rgba(255,255,255,0.82); color: #7f5c4c; border: 1px solid #efdccc; font-size: 11px; touch-action: manipulation; }
      .team-tab.active, .admin-tab.active { background: #c13725; color: white; border-color: transparent; box-shadow: 0 8px 16px rgba(193,55,37,0.18); }
      .team-card { padding: 10px; border-radius: 20px; background: rgba(255,255,255,0.82); border: 1px solid rgba(255,255,255,0.78); height: 100%; overflow: hidden; }
      .team-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
      .team-head h3 { margin: 0; font-size: 15px; letter-spacing: 0.04em; }
      .badge { background: #fff0e5; color: #b63a24; border-radius: 999px; padding: 6px 10px; font-size: 11px; font-weight: 800; }
      .member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; max-height: calc(100vh - 290px); overflow: auto; padding-right: 2px; }
      .member { display:flex; align-items:center; justify-content:space-between; gap:8px; padding: 10px 10px; border-radius: 14px; background: rgba(255,255,255,0.96); border: 1px solid #f2e3d7; min-height: 0; }
      .member strong { display: block; font-size: 13px; }
      .status-pill { display: inline-flex; align-items: center; justify-content: center; min-height: 24px; padding: 0 8px; border-radius: 999px; font-size: 10px; font-weight: 800; white-space: nowrap; width: fit-content; }
      .office { background: #eef7ef; color: #1f7a43; }
      .remote { background: #fff0e5; color: #b63a24; }
      .vacation { background: #fff3e2; color: #ba6b00; }
      .half { background: #ffeaf0; color: #cf4376; }
      .timeoff { background: #f4ecff; color: #6d28d9; }
      .alert-box { display:none; margin-bottom: 10px; padding: 12px 14px; border-radius: 16px; background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; font-size: 13px; line-height: 1.45; }
      .alert-box.show { display:block; }
      .toast { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0.96); min-width: 240px; max-width: calc(100% - 40px); padding: 18px 18px; border-radius: 18px; background: rgba(18, 95, 46, 0.98); color: #ffffff; text-align: center; font-size: 16px; font-weight: 800; box-shadow: 0 20px 36px rgba(31, 122, 67, 0.3); opacity: 0; pointer-events: none; transition: opacity 0.18s ease, transform 0.18s ease; z-index: 99999; }
      .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      .metrics-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
      .metric { padding: 12px; border-radius: 18px; background: rgba(255,255,255,0.84); border: 1px solid rgba(255,255,255,0.8); margin-bottom: 0; }
      .metric small { display: block; color: #7f5c4c; font-size: 11px; letter-spacing: 0.12em; }
      .metric strong { display: block; margin-top: 4px; font-size: 22px; letter-spacing: -0.06em; }
      .metric span { color: #7f5c4c; font-size: 13px; }
      .admin-list { margin-top: 8px; display: none; gap: 6px; max-height: calc(100vh - 310px); overflow: auto; border-top: 1px dashed #e7cdb8; padding-top: 8px; }
      .admin-list.show { display: grid; }
      .admin-item { padding: 12px 12px; border-radius: 16px; background: rgba(255,255,255,0.9); border: 1px solid #efdccc; }
      .admin-item strong { display:block; font-size: 14px; margin-bottom: 5px; }
      .admin-item span { color:#7f5c4c; font-size:12px; }
      .admin-count { margin-top: 4px; font-size: 20px; font-weight: 800; letter-spacing: -0.05em; }
      .empty { color: #98a2b3; font-size: 13px; }
      .bottom-nav { position: fixed; left: 50%; bottom: 10px; transform: translateX(-50%); width: calc(100% - 20px); max-width: 520px; background: rgba(59,22,16,0.95); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 14px 24px rgba(84,28,14,0.24); border-radius: 22px; padding: 6px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .bottom-nav button { min-height: 52px; background: transparent; color: rgba(255,244,238,0.72); border-radius: 16px; font-size: 13px; line-height: 1.15; }
      .bottom-nav button.active { background: linear-gradient(135deg, #be2b1f 0%, #e04829 100%); color: white; }
      @media (max-width: 460px) {
        .hero, .metrics-grid, .field-grid, .member-grid, .btn-row { grid-template-columns: 1fr; }
        .app { padding-bottom: 90px; }
        .member-grid { max-height: calc(100vh - 320px); }
        .admin-list { max-height: calc(100vh - 320px); }
      }
    </style>
  </head>
  <body>
    <div class="toast" id="toast">저장되었습니다.</div>
    <div class="app">
      <section class="hero">
        <div class="today-card">
          <strong>TODAY</strong>
          <span id="todayLabel"></span>
        </div>
      </section>

      <section class="screen active glass panel" id="screen-schedule">
        <div class="panel-title"><h2>WORKING SCHEDULE</h2><span>UPDATE</span></div>
        <div class="status-highlight"><strong>오늘 근무 상태를 가장 빠르게 등록하세요</strong><span>Compact Input</span></div>
        <div class="field-grid">
          <div class="field"><label for="teamSelect">팀</label><select id="teamSelect"></select></div>
          <div class="field"><label for="nameSelect">이름</label><select id="nameSelect"></select></div>
        </div>
        <div class="field"><label for="statusSelect">근무 상태</label><select id="statusSelect"><option value="office">출근</option><option value="remote">재택</option><option value="vacation">연차</option><option value="half-am">오전반차</option><option value="half-pm">오후반차</option><option value="timeoff">반반차 (시간 표시)</option></select></div>
        <div class="field" id="timeField" style="display:none;"><label for="timeInput">시간 표시</label><input id="timeInput" placeholder="예: 15:00~17:00" /></div>
        <div class="btn-row"><button class="primary" id="saveBtn">저장</button><button class="secondary" id="resetBtn">초기화</button></div>
        <div class="helper">팀 선택 후 이름 리스트에서 선택하고 상태를 저장하면 바로 반영됩니다.</div>
      </section>

      <section class="screen glass panel" id="screen-status">
        <div class="team-tabs" id="teamTabs"></div>
        <div id="teamBoard"></div>
      </section>

      <section class="screen glass panel" id="screen-admin">
        <div class="panel-title"><h2>관리자 페이지</h2><span>MONTHLY</span></div>
        <div class="alert-box" id="alertBox"></div>
        <div class="metrics-grid">
          <div class="metric"><small>총 등록 인원</small><strong id="memberCount">0</strong><span>전체 팀 기준 등록된 인원 수</span></div>
        </div>
        <div class="admin-tabs" id="adminTabs"></div>
        <div class="admin-list" id="adminList"></div>
      </section>
    </div>

    <nav class="bottom-nav">
      <button class="active" data-screen="screen-schedule">🗓️<br/>Schedule</button>
      <button data-screen="screen-status">👥<br/>Status</button>
      <button data-screen="screen-admin">📊<br/>Admin</button>
    </nav>

    <script>
      const teams = ['RT TEAM','AFH TEAM','MKT TEAM','FINANCE TEAM','S&OP TEAM','LOGISTICS TEAM','HR TEAM','COUNTRY MANAGER'];
      const defaultMembers = {
        'RT TEAM': ['Alex', 'Thomas', 'Ryan', 'Hugh', 'Luca', 'Adela', 'Dami'],
        'AFH TEAM': ['Austin', 'John', 'Dennis', 'Tom', 'Antonio'],
        'MKT TEAM': ['Jen', 'Jimin', 'Heewon', 'Leo', 'Olivia'],
        'FINANCE TEAM': ['Steve', 'Rachel', 'Joanne', 'Kahn'],
        'S&OP TEAM': ['Grace', 'Sophie', 'Jessica'],
        'LOGISTICS TEAM': ['Edward', 'Amy', 'Jane', 'Nari', 'Ryan'],
        'HR TEAM': ['Claire'],
        'COUNTRY MANAGER': ['YK.Lee']
      };
      const statusMap = {
        office: { label: '출근', className: 'office' },
        remote: { label: '재택', className: 'remote' },
        vacation: { label: '연차', className: 'vacation' },
        'half-am': { label: '오전반차', className: 'half' },
        'half-pm': { label: '오후반차', className: 'half' },
        timeoff: { label: '반반차', className: 'timeoff' }
      };
      const adminViews = [
        { key: 'remote', label: '재택' },
        { key: 'vacation', label: '연차' },
        { key: 'half', label: '반차' },
        { key: 'timeoff', label: '반반차' }
      ];
      const displayTeam = (team) => team
        .replace('RT TEAM', 'RT')
        .replace('AFH TEAM', 'AFH')
        .replace('MKT TEAM', 'MKT')
        .replace('FINANCE TEAM', 'FINANCE')
        .replace('S&OP TEAM', 'S&OP')
        .replace('LOGISTICS TEAM', 'LOGISTICS')
        .replace('HR TEAM', 'HR');
      const storageKey = 'khk-work-status-demo-v5';
      const monthKey = () => {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      };
      const initialState = {
        members: teams.reduce((acc, team) => {
          acc[team] = defaultMembers[team].map(name => ({ name, status: 'office', timeNote: '' }));
          return acc;
        }, {}),
        monthlyCounts: {},
        dailyLogs: {},
        lastResetDate: null
      };
      const saved = localStorage.getItem(storageKey);
      const state = saved ? JSON.parse(saved) : initialState;
      let currentTeam = teams[0];
      let currentAdminTab = null;

      const screens = document.querySelectorAll('.screen');
      const navButtons = document.querySelectorAll('.bottom-nav button');
      const teamSelect = document.getElementById('teamSelect');
      const nameSelect = document.getElementById('nameSelect');
      const statusSelect = document.getElementById('statusSelect');
      const timeField = document.getElementById('timeField');
      const timeInput = document.getElementById('timeInput');
      const teamTabs = document.getElementById('teamTabs');
      const teamBoard = document.getElementById('teamBoard');
      const adminTabs = document.getElementById('adminTabs');
      const adminList = document.getElementById('adminList');
      const alertBox = document.getElementById('alertBox');
      const toast = document.getElementById('toast');

      const showScreen = (id) => {
        screens.forEach(screen => screen.classList.toggle('active', screen.id === id));
        navButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.screen === id));
      };
      const showToast = (message) => {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove('show'), 2600);
      };
      const persist = () => localStorage.setItem(storageKey, JSON.stringify(state));
      const memberCount = () => teams.reduce((sum, team) => sum + state.members[team].length, 0);
      const getMonthBucket = () => {
        const key = monthKey();
        if (!state.monthlyCounts[key]) state.monthlyCounts[key] = {};
        return state.monthlyCounts[key];
      };
      const todayKey = () => {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      };
      const previousDateKey = (dateKey) => {
        const date = new Date(`${dateKey}T00:00:00`);
        date.setDate(date.getDate() - 1);
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
      };
      const incrementMonthly = (name, team, status) => {
        if (status === 'office') return;
        const bucket = getMonthBucket();
        const id = `${team}__${name}`;
        if (!bucket[id]) bucket[id] = { name, team, remote: 0, vacation: 0, half: 0, timeoff: 0 };
        if (status === 'remote') bucket[id].remote += 1;
        else if (status === 'vacation') bucket[id].vacation += 1;
        else if (status === 'half-am' || status === 'half-pm') bucket[id].half += 1;
        else if (status === 'timeoff') bucket[id].timeoff += 1;
      };
      const logDailyStatus = (name, team, status) => {
        const key = todayKey();
        if (!state.dailyLogs[key]) state.dailyLogs[key] = {};
        state.dailyLogs[key][`${team}__${name}`] = { name, team, status };
      };
      const resetDailyStatusesIfNeeded = () => {
        const today = todayKey();
        if (state.lastResetDate === today) return;
        teams.forEach(team => {
          state.members[team] = state.members[team].map(member => ({ ...member, status: 'office', timeNote: '' }));
        });
        state.lastResetDate = today;
        persist();
      };
      const monthlyList = () => Object.values(getMonthBucket()).sort((a, b) => a.team.localeCompare(b.team) || a.name.localeCompare(b.name));
      const weeklyRemoteLimit = () => {
        const now = new Date();
        const weeks = Math.ceil(new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() / 7);
        return weeks * 2;
      };
      const consecutiveRemoteMembers = () => {
        const today = todayKey();
        const prev = previousDateKey(today);
        const todayLogs = state.dailyLogs[today] || {};
        const prevLogs = state.dailyLogs[prev] || {};
        return Object.keys(todayLogs)
          .filter(id => todayLogs[id].status === 'remote' && prevLogs[id]?.status === 'remote')
          .map(id => ({ name: todayLogs[id].name, team: todayLogs[id].team }));
      };

      const renderTeamOptions = () => {
        teamSelect.innerHTML = teams.map(team => `<option value="${team}">${displayTeam(team)}</option>`).join('');
      };
      const renderNameOptions = () => {
        const selectedTeam = teamSelect.value;
        nameSelect.innerHTML = state.members[selectedTeam].map(member => `<option value="${member.name}">${member.name}</option>`).join('');
      };
      const renderTeamTabs = () => {
        teamTabs.innerHTML = teams.map(team => `<button class="team-tab ${team === currentTeam ? 'active' : ''}" data-team="${team}">${displayTeam(team)}</button>`).join('');
        teamTabs.querySelectorAll('[data-team]').forEach(btn => btn.addEventListener('click', () => {
          currentTeam = btn.dataset.team;
          renderTeamTabs();
          renderTeamBoard();
        }));
      };
      const renderTeamBoard = () => {
        const members = state.members[currentTeam];
        teamBoard.innerHTML = `
          <section class="team-card">
            <div class="team-head"><h3>${displayTeam(currentTeam)}</h3><div class="badge">${members.length}명</div></div>
            <div class="member-grid">
              ${members.map(member => {
                const meta = statusMap[member.status];
                const detail = member.status === 'timeoff' && member.timeNote ? member.timeNote : '오늘 상태 등록';
                return `
                  <div class="member">
                    <strong>${member.name}</strong>
                    <div class="status-pill ${meta.className}">${meta.label}${member.status === 'timeoff' && member.timeNote ? ` (${member.timeNote})` : ''}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </section>
        `;
      };
      const renderAdminTabs = () => {
        adminTabs.innerHTML = adminViews.map(tab => `<button class="admin-tab ${tab.key === currentAdminTab ? 'active' : ''}" data-admin="${tab.key}">${tab.label}</button>`).join('');
        adminTabs.querySelectorAll('[data-admin]').forEach(btn => btn.addEventListener('click', () => {
          currentAdminTab = btn.dataset.admin;
          renderAdminTabs();
          renderAdmin();
        }));
      };
      const renderAlerts = (list) => {
        const limit = weeklyRemoteLimit();
        const exceeded = list.filter(item => item.remote > limit);
        const consecutive = consecutiveRemoteMembers();
        const messages = [];
        if (exceeded.length) {
          messages.push(`월간 재택 허용 기준(${limit}회) 초과: ${exceeded.map(item => `${item.name} ${item.remote}회`).join(', ')}`);
        }
        if (consecutive.length) {
          messages.push(`연속 2일 재택 인원: ${consecutive.map(item => `${item.name}(${displayTeam(item.team)})`).join(', ')}`);
        }
        if (!messages.length) {
          alertBox.classList.remove('show');
          alertBox.textContent = '';
          return;
        }
        alertBox.classList.add('show');
        alertBox.textContent = `알람: ${messages.join(' / ')}`;
      };
      const renderAdmin = () => {
        const list = monthlyList();
        const filtered = currentAdminTab ? list.filter(item => item[currentAdminTab] > 0) : [];
        document.getElementById('memberCount').textContent = memberCount();
        renderAlerts(list);
        if (!currentAdminTab) {
          adminList.classList.remove('show');
          adminList.innerHTML = '';
          return;
        }
        adminList.classList.add('show');
        adminList.innerHTML = filtered.length ? filtered.map(item => `
          <div class="admin-item">
            <strong>${item.name} · ${displayTeam(item.team)}</strong>
            <span>${adminViews.find(v => v.key === currentAdminTab).label} 월간 누계</span>
            <div class="admin-count">${item[currentAdminTab]}</div>
          </div>
        `).join('') : `<div class="admin-item"><strong>${adminViews.find(v => v.key === currentAdminTab).label}</strong><span>현재 누적된 인원이 없습니다.</span><div class="admin-count">0</div></div>`;
        adminList.scrollTop = 0;
      };
      const updateToday = () => {
        const now = new Date();
        document.getElementById('todayLabel').textContent = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      };
      const saveStatus = () => {
        const team = teamSelect.value;
        const name = nameSelect.value;
        const status = statusSelect.value;
        const timeNote = timeInput.value.trim();
        if (!name) return;
        const member = state.members[team].find(item => item.name === name);
        if (!member) return;
        member.status = status;
        member.timeNote = status === 'timeoff' ? timeNote : '';
        incrementMonthly(name, team, status);
        logDailyStatus(name, team, status);
        currentTeam = team;
        persist();
        timeInput.value = '';
        renderTeamTabs();
        renderTeamBoard();
        renderAdminTabs();
        renderAdmin();
        showToast('저장되었습니다.');
        setTimeout(() => showScreen('screen-status'), 350);
      };

      statusSelect.addEventListener('change', () => {
        timeField.style.display = statusSelect.value === 'timeoff' ? 'block' : 'none';
      });
      teamSelect.addEventListener('change', renderNameOptions);
      document.getElementById('saveBtn').addEventListener('click', saveStatus);
      document.getElementById('resetBtn').addEventListener('click', () => {
        localStorage.removeItem(storageKey);
        location.reload();
      });
      navButtons.forEach(btn => btn.addEventListener('click', () => showScreen(btn.dataset.screen)));

      resetDailyStatusesIfNeeded();
      renderTeamOptions();
      renderNameOptions();
      renderTeamTabs();
      renderTeamBoard();
      renderAdminTabs();
      renderAdmin();
      updateToday();
    </script>
  </body>
</html>
