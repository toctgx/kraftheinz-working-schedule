<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>KHC Work Status Board</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="KHC Schedule" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <meta name="theme-color" content="#d92d32" />
    <style>
      @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

      /* ── 기본 ── */
      body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f4f4f6; color: #1a1a1a; height: 100dvh; overflow: hidden; }

      /* ── 앱 래퍼 (업비트처럼 전체 고정) ── */
      .app { max-width: 480px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background: #f4f4f6; }

      /* ── 앱 헤더 ── */
      .app-header { flex: 0 0 auto; background: #ffffff; border-bottom: 1px solid #efefef; padding: 14px 16px 10px; display: flex; justify-content: space-between; align-items: center; }
      .app-header-title { font-size: 20px; font-weight: 800; color: #1a1a1a; letter-spacing: -0.04em; }
      .app-header-title span { color: #d92d32; }
      .app-header-date { font-size: 11px; color: #888; font-weight: 500; text-align: right; line-height: 1.5; }

      /* ── 화면 전환 ── */
      .screen { display: none; flex-direction: column; flex: 1 1 auto; min-height: 0; overflow: hidden; }
      .screen.active { display: flex; }

      /* ── 상단 고정 탭바 ── */
      .tab-bar { flex: 0 0 auto; background: #ffffff; border-bottom: 1px solid #efefef; padding: 0 16px; display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
      .tab-bar::-webkit-scrollbar { display: none; }
      .tab-btn { flex: 0 0 auto; padding: 12px 14px; font-size: 13px; font-weight: 600; color: #999; border: none; background: transparent; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; font-family: inherit; }
      .tab-btn.active { color: #d92d32; border-bottom-color: #d92d32; font-weight: 800; }

      /* ── 스크롤 본문 ── */
      .scroll-area { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px 24px; }

      /* ── 등록 화면 ── */
      .section-card { background: #ffffff; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
      .section-label { font-size: 11px; font-weight: 700; color: #999; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
      .field { margin-bottom: 10px; }
      .field label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; font-weight: 600; }
      .field select, .field input { width: 100%; height: 46px; border: 1px solid #e8e8e8; border-radius: 12px; padding: 0 14px; font: inherit; font-size: 14px; font-weight: 600; background: #fafafa; color: #1a1a1a; outline: none; }
      .field select:focus, .field input:focus { border-color: #d92d32; background: #fff; }
      .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .save-btn { width: 100%; height: 50px; background: #d92d32; color: #fff; border: none; border-radius: 14px; font: inherit; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 4px; }
      .notice-box { background: #fff5f5; border-radius: 14px; padding: 14px; border-left: 3px solid #d92d32; }
      .notice-box p { font-size: 12px; color: #8f1d22; line-height: 1.7; font-weight: 600; }
      .notice-box p::before { content: '📌  '; }
      .checkin-badge { background: #fff5f5; border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ffd6d8; }
      .checkin-badge strong { font-size: 13px; color: #8f1d22; }
      .checkin-badge span { font-size: 12px; font-weight: 700; color: #d92d32; }

      /* ── 현황 화면 멤버 목록 ── */
      .member-list { display: flex; flex-direction: column; gap: 1px; background: #efefef; border-radius: 14px; overflow: hidden; }
      .member-item { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; background: #ffffff; }
      .member-item:first-child { border-radius: 14px 14px 0 0; }
      .member-item:last-child { border-radius: 0 0 14px 14px; }
      .member-item:only-child { border-radius: 14px; }
      .member-name { font-size: 14px; font-weight: 700; color: #1a1a1a; }
      .member-team-tag { font-size: 11px; color: #aaa; font-weight: 500; margin-top: 2px; }
      .status-chip { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
      .chip-office { background: #eef7ef; color: #1f7a43; }
      .chip-remote { background: #fff1f2; color: #d92d32; }
      .chip-vacation { background: #fff3e2; color: #ba6b00; }
      .chip-half { background: #ffeaf0; color: #cf4376; }
      .chip-timeoff { background: #f4ecff; color: #6d28d9; }
      .list-header { display: flex; justify-content: space-between; align-items: center; padding: 0 2px 10px; }
      .list-header-title { font-size: 15px; font-weight: 800; color: #1a1a1a; }
      .list-header-count { font-size: 13px; font-weight: 700; color: #d92d32; }
      .empty-state { text-align: center; padding: 40px 0; color: #bbb; font-size: 13px; }

      /* ── 관리자 화면 ── */
      .admin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
      .admin-card { background: #ffffff; border-radius: 12px; padding: 12px 10px; display: flex; justify-content: space-between; align-items: center; }
      .admin-card-name { font-size: 13px; font-weight: 700; color: #1a1a1a; }
      .admin-card-count { font-size: 13px; font-weight: 800; color: #d92d32; background: #fff1f2; padding: 3px 8px; border-radius: 999px; }
      .rule-box { background: #fff7f7; border-radius: 14px; padding: 14px 16px; margin-top: 10px; border: 1px solid #ffd6d8; }
      .rule-box strong { display: block; font-size: 14px; color: #8f1d22; margin-bottom: 8px; font-weight: 800; }
      .rule-box ul { padding-left: 18px; }
      .rule-box li { font-size: 12px; color: #8f1d22; line-height: 1.8; }

      /* ── 하단 네비 ── */
      .bottom-nav { flex: 0 0 auto; background: #ffffff; border-top: 1px solid #efefef; padding: 6px 0 max(6px, env(safe-area-inset-bottom)); display: grid; grid-template-columns: repeat(3, 1fr); }
      .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 6px 0; border: none; background: transparent; color: #bbb; font: inherit; font-size: 11px; font-weight: 600; cursor: pointer; }
      .nav-btn.active { color: #d92d32; }
      .nav-btn svg { transition: none; }

      /* ── PIN ── */
      .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #ccc; background: transparent; transition: background 0.15s; }
      .pin-dot.filled { background: #1a1a1a; border-color: #1a1a1a; }
      .pin-btn { height: 64px; background: #fff; border: 1px solid #efefef; border-radius: 16px; font-size: 22px; font-weight: 700; color: #1a1a1a; cursor: pointer; font-family: inherit; }
      .pin-btn:active { background: #f4f4f6; }
      .pin-del { font-size: 18px; color: #666; }

      /* ── 알람 ── */
      .alarm-bar { background: #fff; border-bottom: 1px solid #efefef; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; min-height: 44px; cursor: pointer; }
      .alarm-bar-left { display: flex; align-items: center; gap: 8px; }
      .alarm-bell { position: relative; font-size: 18px; }
      .alarm-badge { position: absolute; top: -4px; right: -6px; background: #d92d32; color: #fff; font-size: 9px; font-weight: 800; border-radius: 999px; padding: 1px 5px; min-width: 16px; text-align: center; }
      .alarm-title { font-size: 13px; font-weight: 700; color: #1a1a1a; }
      .alarm-chevron { font-size: 11px; color: #bbb; transition: transform 0.2s; }
      .alarm-chevron.open { transform: rotate(180deg); }
      .alarm-list { background: #fafafa; border-bottom: 1px solid #efefef; max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
      .alarm-list.open { max-height: 300px; overflow-y: auto; }
      .alarm-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #f0f0f0; }
      .alarm-item:last-child { border-bottom: none; }
      .alarm-item-text { font-size: 12px; color: #333; line-height: 1.5; }
      .alarm-item-time { font-size: 11px; color: #bbb; white-space: nowrap; margin-left: 8px; }
      .alarm-empty { padding: 16px; text-align: center; font-size: 12px; color: #bbb; }
      .alarm-clear { padding: 8px 16px; text-align: right; }
      .alarm-clear button { font-size: 11px; color: #999; background: none; border: none; cursor: pointer; font-family: inherit; min-height: unset; padding: 4px 8px; border-radius: 8px; }

      /* ── 토스트 ── */
      .toast { position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%) translateY(10px); min-width: 200px; padding: 12px 20px; border-radius: 999px; background: rgba(30,30,30,0.88); color: #fff; text-align: center; font-size: 13px; font-weight: 700; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 9999; }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
  </head>
  <body>
    <div class="toast" id="toast">저장되었습니다.</div>
    <div class="app">

      <!-- 앱 헤더 -->
      <header class="app-header">
        <div style="display:flex;align-items:center;gap:8px;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Kraft_Heinz_logo.svg/320px-Kraft_Heinz_logo.svg.png" alt="Kraft Heinz" style="height:28px;object-fit:contain;" onerror="this.style.display='none';document.getElementById('khc-fallback').style.display='block'">
          <div id="khc-fallback" style="display:none;font-size:18px;font-weight:800;color:#1a1a1a;letter-spacing:-0.04em;">Kraft<span style="color:#d92d32;"> Heinz</span></div>
          <span style="font-size:22px;">🇰🇷</span>
        </div>
        <div class="app-header-date" id="todayLabel"></div>
      </header>

      <!-- 등록 화면 -->
      <section class="screen active" id="screen-schedule">
        <div id="alarmBar" class="alarm-bar">
          <div class="alarm-bar-left">
            <div class="alarm-bell">
              🔔
              <span class="alarm-badge" id="alarmBadge" style="display:none;">0</span>
            </div>
            <span class="alarm-title">근무 상태 변경 알림</span>
          </div>
          <span class="alarm-chevron" id="alarmChevron">▼</span>
        </div>
        <div class="alarm-list" id="alarmList">
          <div id="alarmItems"><div class="alarm-empty">변경 내역이 없습니다.</div></div>
          <div class="alarm-clear"><button id="alarmClearBtn">모두 지우기</button></div>
        </div>
        <div class="scroll-area">
          <div class="checkin-badge">
            <strong>매일 아침 체크해보세요 😃</strong>
          </div>
          <div class="section-card">
            <div class="section-label">WORKING SCHEDULE</div>
            <div class="field-row">
              <div class="field"><label for="teamSelect">팀</label><select id="teamSelect"></select></div>
              <div class="field"><label for="nameSelect">이름</label><select id="nameSelect"></select></div>
            </div>
            <div class="field"><label for="statusSelect">근무 형태</label><select id="statusSelect"><option value="office">오피스</option><option value="remote">재택근무</option><option value="vacation">휴가</option><option value="half-am">오전 반차</option><option value="half-pm">오후 반차</option><option value="timeoff">반반차</option></select></div>
            <div class="field" id="timeField" style="display:none;"><label for="timeInput">시간 메모</label><input id="timeInput" placeholder="예: 15:00~17:00" /></div>
            <button class="save-btn" id="saveBtn">저장</button>
          </div>
          <div class="notice-box">
            <p>매월 1일 working schedule excel 파일기준으로 업데이트됩니다.<br>개인사정에 따라 상태 변경이 필요할 경우 위에서 직접 수정하여 저장해주시면됩니다.</p>
          </div>
        </div>
      </section>

      <!-- 현황 화면 -->
      <section class="screen" id="screen-status">
        <div class="tab-bar" id="teamTabs"></div>
        <div class="scroll-area" id="teamBoard"></div>
      </section>

      <!-- 비밀번호 화면 -->
      <section class="screen" id="screen-pin">
        <div class="scroll-area" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;">
          <div style="text-align:center;margin-bottom:32px;">
            <div style="font-size:40px;margin-bottom:12px;">🔒</div>
            <div style="font-size:18px;font-weight:800;color:#1a1a1a;margin-bottom:6px;">관리자 페이지</div>
            <div style="font-size:13px;color:#999;">비밀번호를 입력해주세요</div>
          </div>
          <div style="display:flex;gap:12px;margin-bottom:24px;" id="pinDots">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
          </div>
          <div id="pinError" style="color:#d92d32;font-size:13px;font-weight:700;height:20px;margin-bottom:12px;"></div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;">
            <button class="pin-btn" data-n="1">1</button><button class="pin-btn" data-n="2">2</button><button class="pin-btn" data-n="3">3</button>
            <button class="pin-btn" data-n="4">4</button><button class="pin-btn" data-n="5">5</button><button class="pin-btn" data-n="6">6</button>
            <button class="pin-btn" data-n="7">7</button><button class="pin-btn" data-n="8">8</button><button class="pin-btn" data-n="9">9</button>
            <div></div><button class="pin-btn" data-n="0">0</button><button class="pin-btn pin-del" data-n="del">⌫</button>
          </div>
        </div>
      </section>

      <!-- 관리자 화면 -->
      <section class="screen" id="screen-admin">
        <div class="tab-bar" id="ruleTabs">
          <button class="tab-btn" data-rule="house">하우스 룰</button>
          <button class="tab-btn" data-rule="overwork">재택 초과</button>
          <button class="tab-btn" data-rule="consecutive">연속 재택</button>
        </div>
        <div class="tab-bar" id="adminTabs"></div>
        <div class="scroll-area" id="adminScrollArea">
          <div id="ruleBox" style="margin-bottom:12px;"></div>
          <div id="adminList"></div>
        </div>
      </section>

      <!-- 하단 네비 -->
      <nav class="bottom-nav">
        <button class="nav-btn active" data-screen="screen-schedule">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>등록</span>
        </button>
        <button class="nav-btn" data-screen="screen-status">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>현황</span>
        </button>
        <button class="nav-btn" id="adminNavBtn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>관리자</span>
        </button>
      </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
      const teams = ['RT TEAM','AFH TEAM','MKT TEAM','FINANCE TEAM','S&OP TEAM','LOGISTICS TEAM','HR TEAM','COUNTRY MANAGER'];
      const defaultMembers = {
        'RT TEAM': ['Alex', 'Thomas', 'Ryan', 'Hugh', 'Luca', 'Adela', 'Dami'],
        'AFH TEAM': ['Austin', 'John', 'Dennis', 'Tom', 'Antonio'],
        'MKT TEAM': ['Jen', 'Jimin', 'Heewon', 'Leo', 'Olivia'],
        'FINANCE TEAM': ['Steve', 'Rachel', 'Joanne', 'Kahn'],
        'S&OP TEAM': ['Grace', 'Sophie', 'Jessica'],
        'LOGISTICS TEAM': ['Edward', 'Amy', 'Jane', 'Nari', 'Ryan'],
        'HR TEAM': ['Claire'],
        'COUNTRY MANAGER': ['YK.Lee']
      };
      const statusMap = {
        office: { label: '오피스', className: 'office' },
        remote: { label: '재택', className: 'remote' },
        vacation: { label: '휴가', className: 'vacation' },
        'half-am': { label: '오전 반차', className: 'half' },
        'half-pm': { label: '오후 반차', className: 'half' },
        timeoff: { label: '반반차', className: 'timeoff' }
      };
      const adminViews = [
        { key: 'remote', label: '재택근무' },
        { key: 'vacation', label: '휴가' },
        { key: 'halfAm', label: '오전 반차' },
        { key: 'halfPm', label: '오후 반차' },
        { key: 'timeoff', label: '반반차' }
      ];
      const displayTeam = (team) => team
        .replace('RT TEAM', 'RT')
        .replace('AFH TEAM', 'AFH')
        .replace('MKT TEAM', 'MKT')
        .replace('FINANCE TEAM', 'FINANCE')
        .replace('S&OP TEAM', 'S&OP')
        .replace('LOGISTICS TEAM', 'LOGISTICS')
        .replace('HR TEAM', 'HR');
      const storageKey = 'khk-work-status-demo-v7';
      const alarmKey = 'khk-alarm-log-v1';
      const monthKey = (date = new Date()) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
      const createInitialState = () => ({
        members: teams.reduce((acc, team) => {
          acc[team] = defaultMembers[team].map(name => ({ name, status: 'office', timeNote: '' }));
          return acc;
        }, {}),
        monthlyCounts: {},
        dailyLogs: {},
        importedMonthlyCounts: {},
        lastResetDate: null
      });
      const initialState = createInitialState();
      const saved = localStorage.getItem(storageKey);
      const state = saved ? { ...createInitialState(), ...JSON.parse(saved) } : initialState;
      let currentTeam = 'office';
      let currentAdminTab = null;

      const screens = document.querySelectorAll('.screen');
      const navButtons = document.querySelectorAll('.nav-btn');
      const teamSelect = document.getElementById('teamSelect');
      const nameSelect = document.getElementById('nameSelect');
      const statusSelect = document.getElementById('statusSelect');
      const timeField = document.getElementById('timeField');
      const timeInput = document.getElementById('timeInput');
      const teamTabs = document.getElementById('teamTabs');
      const teamBoard = document.getElementById('teamBoard');
      const adminTabs = document.getElementById('adminTabs');
      const adminList = document.getElementById('adminList');
      const toast = document.getElementById('toast');
      const ruleCard = document.getElementById('ruleCard');
      let importedAprilSheet = null;

      const showScreen = (id) => {
        screens.forEach(screen => screen.classList.toggle('active', screen.id === id));
        navButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.screen === id));
        // 화면 전환 시 매니저 admin 탭 스크롤 위치 초기화
        if (id === 'screen-admin') { const sa = document.getElementById('adminScrollArea'); if(sa) sa.scrollTop = 0; }
      };
      // 알람 로직
      const statusLabels = { office: '오피스', remote: '재택근무', vacation: '휴가', 'half-am': '오전 반차', 'half-pm': '오후 반차', timeoff: '반반차' };
      let alarmLogs = JSON.parse(localStorage.getItem(alarmKey) || '[]');
      let alarmOpen = false;

      const renderAlarm = () => {
        const badge = document.getElementById('alarmBadge');
        const items = document.getElementById('alarmItems');
        const unread = alarmLogs.filter(a => !a.read).length;
        badge.style.display = unread > 0 ? 'block' : 'none';
        badge.textContent = unread;
        items.innerHTML = alarmLogs.length ? alarmLogs.slice().reverse().map(a => `
          <div class="alarm-item">
            <span class="alarm-item-text"><strong>${a.name}</strong> 근무 상태를 <strong>${a.status}</strong>으로 변경했습니다.</span>
            <span class="alarm-item-time">${a.time}</span>
          </div>
        `).join('') : '<div class="alarm-empty">변경 내역이 없습니다.</div>';
      };
      const addAlarm = (name, status, timeNote) => {
        const now = new Date();
        const time = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        const label = status === 'timeoff' && timeNote ? `반반차 ${timeNote}` : (statusLabels[status] || status);
        alarmLogs.push({ name, status: label, time, read: false });

      const showToast = (message) => {

        showToast.timer = setTimeout(() => toast.classList.remove('show'), 1200);
      };
      const persist = () => localStorage.setItem(storageKey, JSON.stringify(state));
      const memberCount = () => teams.reduce((sum, team) => sum + state.members[team].length, 0);
      const getMonthBucket = () => {
        const key = monthKey();
        if (!state.monthlyCounts[key]) state.monthlyCounts[key] = {};
        return state.monthlyCounts[key];
      };
      const todayKey = () => {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      };
      const previousDateKey = (dateKey) => {
        const date = new Date(`${dateKey}T00:00:00`);
        date.setDate(date.getDate() - 1);
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
      };
      const normalizeState = () => {
        teams.forEach(team => {
          const currentMembers = state.members[team] || [];
          const byName = new Map(currentMembers.map(member => [member.name, member]));
          state.members[team] = defaultMembers[team].map(name => {
            const existing = byName.get(name);
            return existing
              ? { name, status: existing.status || 'office', timeNote: existing.timeNote || '' }
              : { name, status: 'office', timeNote: '' };
          });
        });
        state.monthlyCounts ||= {};
        state.dailyLogs ||= {};
        state.importedMonthlyCounts ||= {};
      };
      const recalculateMonthlyCounts = () => {
        state.monthlyCounts = {};
        Object.entries(state.dailyLogs || {}).forEach(([dateKey, entries]) => {
          const bucketKey = monthKey(new Date(`${dateKey}T00:00:00`));
          if (!state.monthlyCounts[bucketKey]) state.monthlyCounts[bucketKey] = {};
          Object.values(entries).forEach(({ name, team, status }) => {
            if (status === 'office') return;
            const id = `${team}__${name}`;
            if (!state.monthlyCounts[bucketKey][id]) state.monthlyCounts[bucketKey][id] = { name, team, remote: 0, vacation: 0, halfAm: 0, halfPm: 0, timeoff: 0 };
            if (status === 'remote') state.monthlyCounts[bucketKey][id].remote += 1;
            else if (status === 'vacation') state.monthlyCounts[bucketKey][id].vacation += 1;
            else if (status === 'half-am') state.monthlyCounts[bucketKey][id].halfAm += 1;
            else if (status === 'half-pm') state.monthlyCounts[bucketKey][id].halfPm += 1;
            else if (status === 'timeoff') state.monthlyCounts[bucketKey][id].timeoff += 1;
          });
        });
      };
      const logDailyStatus = (name, team, payload) => {
        const key = todayKey();
        if (!state.dailyLogs[key]) state.dailyLogs[key] = {};
        state.dailyLogs[key][`${team}__${name}`] = { name, team, status: payload.status, timeNote: payload.timeNote || '', eventType: payload.eventType || '' };
      };
      const syncMembersWithTodayLog = () => {
        const todayLogs = state.dailyLogs[todayKey()] || {};
        teams.forEach(team => {
          state.members[team] = state.members[team].map(member => {
            const todayEntry = todayLogs[`${team}__${member.name}`];
            return todayEntry
              ? { ...member, status: todayEntry.status || 'office', timeNote: todayEntry.timeNote || '' }
              : { ...member, status: 'office', timeNote: '' };
          });
        });
      };
      const resetDailyStatusesIfNeeded = () => {
        const today = todayKey();
        const hasTodayLog = !!state.dailyLogs?.[today] && Object.keys(state.dailyLogs[today]).length > 0;
        if (state.lastResetDate !== today) {
          teams.forEach(team => {
            state.members[team] = state.members[team].map(member => ({ ...member, status: 'office', timeNote: '' }));
          });
          state.lastResetDate = today;
        }
        if (hasTodayLog) {
          syncMembersWithTodayLog();
        }
        persist();
      };
      const monthlyList = () => {
        const imported = state.importedMonthlyCounts?.[monthKey()];
        const source = imported && Object.keys(imported).length ? imported : getMonthBucket();
        return Object.values(source).sort((a, b) => a.team.localeCompare(b.team) || a.name.localeCompare(b.name));
      };
      const weeklyRemoteLimit = () => {
        const now = new Date();
        const weeks = Math.ceil(new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() / 7);
        return weeks * 2;
      };
      const consecutiveRemoteMembers = () => {
        const today = todayKey();
        const prev = previousDateKey(today);
        const todayLogs = state.dailyLogs[today] || {};
        const prevLogs = state.dailyLogs[prev] || {};
        return Object.keys(todayLogs)
          .filter(id => todayLogs[id].status === 'remote' && prevLogs[id]?.status === 'remote')
          .map(id => ({ name: todayLogs[id].name, team: todayLogs[id].team }));

      const renderTeamOptions = () => {

      const renderNameOptions = () => {

      const statusViews = [
        { key: 'office', label: '오피스', match: member => member.status === 'office' },
        { key: 'remote', label: '재택근무', match: member => member.status === 'remote' },
        { key: 'vacation', label: '휴가', match: member => member.status === 'vacation' },
        { key: 'half-am', label: '오전 반차', match: member => member.status === 'half-am' },
        { key: 'half-pm', label: '오후 반차', match: member => member.status === 'half-pm' },
        { key: 'timeoff', label: '반반차', match: member => member.status === 'timeoff' }
      ];
      const renderTeamTabs = () => {
        teamTabs.innerHTML = statusViews.map(view => `<button class="tab-btn ${view.key === currentTeam ? 'active' : ''}" data-team="${view.key}">${view.label}</button>`).join('');

      const renderTeamBoard = () => {

        const members = teams.flatMap(team => state.members[team].map(member => ({ ...member, team }))).filter(currentView.match);

      const renderAdminTabs = () => {

          html = `<div class="rule-box"><strong>하우스 룰</strong><ul><li>재택근무는 기본적으로 주 2일로 제한됩니다.</li><li>월간 재택 횟수가 한도를 초과하면 관리자 화면에 표시됩니다.</li><li>재택근무는 2일 연속으로 등록할 수 없습니다.</li></ul></div>`;
        } else if (mode === 'overwork') {

            ? `<div class="rule-box"><strong>재택 초과 인원</strong><ul>${exceeded.map(item => `<li>${item.name} (${displayTeam(item.team)}) - ${item.remote}일</li>`).join('')}</ul></div>`
            : `<div class="rule-box"><strong>재택 초과 인원</strong><ul><li>현재 한도를 초과한 인원이 없습니다.</li></ul></div>`;

            : `<div class="rule-box"><strong>연속 재택 인원</strong><ul><li>현재 연속 재택 인원이 없습니다.</li></ul></div>`;

        ruleBox.innerHTML = html;
      };
      const renderAdmin = () => {

          { key: 'halfAm', label: '오전 반차', color: '#cf4376' },
          { key: 'halfPm', label: '오후 반차', color: '#9333ea' },
          { key: 'timeoff', label: '반반차', color: '#6d28d9' },
        ];
        const counts = stats.map(s => ({
          ...s,
          count: list.reduce((sum, item) => sum + (item[s.key] || 0), 0)
        }));
        const maxCount = Math.max(...counts.map(c => c.count), 1);

        const filtered = currentAdminTab ? list.filter(item => item[currentAdminTab] > 0) : [];
        adminList.innerHTML = currentAdminTab ? `
          <div class="admin-grid">

                <span class="admin-card-count">${item[currentAdminTab]}일</span>

          </div>
        ` : '';
      };
      const parseImportedStatus = (raw) => {
        const value = String(raw || '').trim();
        if (!value) return null;
        if (value === 'O') return { status: 'office', timeNote: '', eventType: '' };
        if (value === 'H') return { status: 'remote', timeNote: '', eventType: '' };
        if (value === 'D') return { status: 'vacation', timeNote: '', eventType: 'leave' };
        if (/^D\((오전|AM)\)$/i.test(value)) return { status: 'half-am', timeNote: '', eventType: 'leave_am' };
        if (/^D\((오후|PM)\)$/i.test(value) || /^D오후\)?$/i.test(value)) return { status: 'half-pm', timeNote: '', eventType: 'leave_pm' };
        if (/^D[(/]/.test(value) || /^D\(/.test(value)) return { status: 'vacation', timeNote: '', eventType: 'leave' };
        return { status: 'office', timeNote: value, eventType: 'office_event' };
      };
      const teamAliases = {
        Alex: 'RT TEAM', Thomas: 'RT TEAM', Ryan: 'RT TEAM', Hugh: 'RT TEAM', Luca: 'RT TEAM', Adela: 'RT TEAM', Lilly: 'RT TEAM',

        Jen: 'MKT TEAM', Jimin: 'MKT TEAM', Leo: 'MKT TEAM', Heewon: 'MKT TEAM', Olivia: 'MKT TEAM',
        Steve: 'FINANCE TEAM', Rachel: 'FINANCE TEAM', Joanne: 'FINANCE TEAM', Khan: 'FINANCE TEAM', Claire: 'HR TEAM',
        Grace: 'S&OP TEAM', Jessica: 'S&OP TEAM', Sophie: 'S&OP TEAM',
        Edward: 'LOGISTICS TEAM', Amy: 'LOGISTICS TEAM', Jane: 'LOGISTICS TEAM', Nari: 'LOGISTICS TEAM'
      };
      const normalizeImportedName = (name) => {

      };
      const importAprilSheet = async () => {
        const response = await fetch('./assets/working_schedule_apr.xlsx');

        const workbook = XLSX.read(buffer, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        showToast('April sheet imported.');

      const findSectionHeaderRow = (sheetRows, todayDate) => {
        for (let i = 0; i < sheetRows.length; i += 1) {
          const row = sheetRows[i] || [];
          if (row[1] === 'Working Hours' && row[2] === 'Name') {
            const dayColumn = row.findIndex(cell => Number(cell) === todayDate);
            if (dayColumn !== -1) return { headerRowIndex: i, dayColumn };
          }
        }
        return null;

      const rebuildImportedMonthlyCounts = () => {

          if (index < 6) return;
          const rawName = row?.[2];
          if (!rawName || rawName === 'Name' || rawName === 'TTL by Day') return;
          if (!teamAliases[rawName]) return;
          const team = teamAliases[rawName];
          const name = normalizeImportedName(rawName);
          const id = `${team}__${name}`;
          if (!state.importedMonthlyCounts[bucketKey][id]) state.importedMonthlyCounts[bucketKey][id] = { name, team, remote: 0, vacation: 0, halfAm: 0, halfPm: 0, timeoff: 0 };
          for (let col = 5; col < row.length; col += 1) {
            const parsed = parseImportedStatus(row[col]);
            if (!parsed) continue;
            if (parsed.status === 'remote') state.importedMonthlyCounts[bucketKey][id].remote += 1;
            else if (parsed.status === 'vacation') state.importedMonthlyCounts[bucketKey][id].vacation += 1;
            else if (parsed.status === 'half-am') state.importedMonthlyCounts[bucketKey][id].halfAm += 1;
            else if (parsed.status === 'half-pm') state.importedMonthlyCounts[bucketKey][id].halfPm += 1;
            else if (parsed.status === 'timeoff') state.importedMonthlyCounts[bucketKey][id].timeoff += 1;
          }
        });
      };
      const applyImportedSheetToToday = () => {
        if (!importedAprilSheet) {
          showToast('Import the April sheet first.');
          return;

        const todayDate = new Date().getDate();
        const headerInfo = findSectionHeaderRow(importedAprilSheet, todayDate);
        if (!headerInfo) {
          showToast('Today was not found in the April sheet.');
          return;
        }
        const { dayColumn } = headerInfo;
        const today = todayKey();
        state.dailyLogs[today] = {};
        teams.forEach(team => {
          state.members[team] = state.members[team].map(member => ({ ...member, status: 'office', timeNote: '' }));
        });
        let appliedCount = 0;
        importedAprilSheet.forEach((row, index) => {
          if (index < 6) return;
          const rawName = row?.[2];
          if (!rawName || rawName === 'Name' || rawName === 'TTL by Day') return;
          if (!teamAliases[rawName]) return;

          const name = normalizeImportedName(rawName);

          if (!member) return;
          member.status = parsed.status;
          member.timeNote = parsed.timeNote || '';
          state.dailyLogs[today][`${team}__${member.name}`] = { name: member.name, team, status: parsed.status, timeNote: parsed.timeNote || '', eventType: parsed.eventType || '' };
          appliedCount += 1;

        state.lastResetDate = today;
        rebuildImportedMonthlyCounts();
        recalculateMonthlyCounts();
        persist();
        renderTeamTabs();
        renderTeamBoard();
        renderAdminTabs();
        renderAdmin();
        const remoteCount = teams.flatMap(team => state.members[team]).filter(member => member.status === 'remote').length;
        showToast(`오늘 스케줄이 자동 반영되었습니다.`);

      const updateToday = () => {

        const weekday = now.toLocaleDateString('ko-KR', { weekday: 'long' });

      const saveStatus = () => {

      const autoApplySheetIfNeeded = async () => {
        const today = todayKey();

        const currentMonth = new Date().getMonth() + 1;
        const fileName = monthFileNames[currentMonth];
        try {
          const response = await fetch(`./assets/${fileName}`);
          if (!response.ok) return;
          const buffer = await response.arrayBuffer();
          const workbook = XLSX.read(buffer, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          importedAprilSheet = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: '' });
          const todayDate = new Date().getDate();
          const headerInfo = findSectionHeaderRow(importedAprilSheet, todayDate);
          if (!headerInfo) return; // today not in sheet, skip silently
          const { dayColumn } = headerInfo;
          state.dailyLogs[today] = {};
          teams.forEach(team => {
            state.members[team] = state.members[team].map(member => ({ ...member, status: 'office', timeNote: '' }));

            const parsed = parseImportedStatus(row[dayColumn]);

            const team = teamAliases[rawName];
            const name = normalizeImportedName(rawName);
            const member = state.members[team]?.find(item => item.name === name);
            if (!member) return;
            member.status = parsed.status;
            member.timeNote = parsed.timeNote || '';
            state.dailyLogs[today][`${team}__${member.name}`] = { name: member.name, team, status: parsed.status, timeNote: parsed.timeNote || '', eventType: parsed.eventType || '' };
          });
          state.lastResetDate = today;
          rebuildImportedMonthlyCounts();
          recalculateMonthlyCounts();
          persist();
          renderTeamTabs();
          renderTeamBoard();
          renderAdminTabs();
          renderAdmin();
          showToast('오늘 스케줄이 자동 반영되었습니다.');
        } catch (e) {
          // silently fail - sheet might not exist or network issue
        }
      };
      autoApplySheetIfNeeded();

      // PWA 서비스워커 등록
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    </script>
  </body>
</html>
